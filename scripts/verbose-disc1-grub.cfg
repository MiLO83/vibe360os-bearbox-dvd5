set timeout=30
set default=0

loadfont unicode
terminal_output console

set menu_color_normal=white/black
set menu_color_highlight=black/light-gray

search --no-floppy --label BEARBOX_D1 --set=root

set bearbox_debug_args="console=tty0 loglevel=7 ignore_loglevel debug systemd.show_status=1 systemd.log_level=debug systemd.log_target=console rd.debug earlycon=efifb keep_bootcon efi=debug"
set bearbox_safe_debug_args="${bearbox_debug_args} nomodeset nouveau.modeset=0"
set bearbox_noefi_debug_args="${bearbox_safe_debug_args} noefi"
set bearbox_acpi_debug_args="${bearbox_safe_debug_args} noapic nolapic irqpoll pci=nomsi"
set bearbox_pci_debug_args="${bearbox_safe_debug_args} pci=nommconf,noaer,routeirq pcie_aspm=off"
set bearbox_acpi_off_debug_args="${bearbox_pci_debug_args} acpi=off"
set bearbox_gpu_blacklist_args="${bearbox_safe_debug_args} modprobe.blacklist=nouveau,nvidia,nvidia_drm,nvidia_modeset nouveau.blacklist=1 rd.driver.blacklist=nouveau video=efifb:off"
set bearbox_pci_resource_args="${bearbox_safe_debug_args} pci=nocrs,realloc=off,noaer pcie_aspm=off"
set bearbox_media_args="boot=casper live-media=/dev/disk/by-label/BEARBOX_D1 live-media-path=/CASPER ignore_uuid"

menuentry "BearBox PARTITION HWE NVIDIA bus 23 blacklist (try first)" {
	set gfxpayload=text
	linux	/CASPER/HWE_VMLINUZ ${bearbox_media_args} autoinstall ds=nocloud\;s=/cdrom/NOCLOUD/ ${bearbox_gpu_blacklist_args} ---
	initrd	/CASPER/HWE_INITRD
}
menuentry "BearBox PARTITION HWE PCI resource fallback" {
	set gfxpayload=text
	linux	/CASPER/HWE_VMLINUZ ${bearbox_media_args} autoinstall ds=nocloud\;s=/cdrom/NOCLOUD/ ${bearbox_pci_resource_args} ---
	initrd	/CASPER/HWE_INITRD
}
menuentry "BearBox PARTITION HWE ACPI off" {
	set gfxpayload=text
	linux	/CASPER/HWE_VMLINUZ ${bearbox_media_args} autoinstall ds=nocloud\;s=/cdrom/NOCLOUD/ ${bearbox_acpi_off_debug_args} ---
	initrd	/CASPER/HWE_INITRD
}
menuentry "BearBox PARTITION normal NVIDIA bus 23 blacklist" {
	set gfxpayload=text
	linux	/CASPER/VMLINUZ ${bearbox_media_args} autoinstall ds=nocloud\;s=/cdrom/NOCLOUD/ ${bearbox_gpu_blacklist_args} ---
	initrd	/CASPER/INITRD
}
menuentry "BearBox PARTITION normal PCI bridge fallback" {
	set gfxpayload=text
	linux	/CASPER/VMLINUZ ${bearbox_media_args} autoinstall ds=nocloud\;s=/cdrom/NOCLOUD/ ${bearbox_pci_debug_args} ---
	initrd	/CASPER/INITRD
}
menuentry "BearBox PARTITION normal safe graphics" {
	set gfxpayload=text
	linux	/CASPER/VMLINUZ ${bearbox_media_args} autoinstall ds=nocloud\;s=/cdrom/NOCLOUD/ ${bearbox_safe_debug_args} ---
	initrd	/CASPER/INITRD
}
menuentry "BearBox PARTITION FULL WIPE HWE NVIDIA bus 23 blacklist" {
	set gfxpayload=text
	linux	/CASPER/HWE_VMLINUZ ${bearbox_media_args} autoinstall ds=nocloud\;s=/cdrom/NOCLOUD_WIPE/ ${bearbox_gpu_blacklist_args} ---
	initrd	/CASPER/HWE_INITRD
}
menuentry "BearBox PARTITION Try Ubuntu HWE safe graphics" {
	set gfxpayload=text
	linux	/CASPER/HWE_VMLINUZ ${bearbox_media_args} ${bearbox_safe_debug_args} ---
	initrd	/CASPER/HWE_INITRD
}
menuentry "BearBox PARTITION normal last resort ACPI off" {
	set gfxpayload=text
	linux	/CASPER/VMLINUZ ${bearbox_media_args} autoinstall ds=nocloud\;s=/cdrom/NOCLOUD/ ${bearbox_acpi_off_debug_args} ---
	initrd	/CASPER/INITRD
}
menuentry "UEFI Firmware Settings" {
	fwsetup
}
