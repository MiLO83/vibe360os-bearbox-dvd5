menuentry "BearBox FULL WIPE VERBOSE safe graphics" {
	set gfxpayload=text
	linux	/casper/vmlinuz autoinstall ds=nocloud\;s=/cdrom/nocloud-wipe/ ${bearbox_safe_debug_args} ---
	initrd	/casper/initrd
}
menuentry "Try or Install Ubuntu Server VERBOSE safe graphics" {
	set gfxpayload=text
	linux	/casper/vmlinuz ${bearbox_safe_debug_args} ---
	initrd	/casper/initrd
}
menuentry "UEFI Firmware Settings" {
	fwsetup
}
